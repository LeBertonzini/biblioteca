<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliotech</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Bibliotech</h1>

    <section>
        <h2>Cadastrar Cliente</h2>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="text" id="cpf" placeholder="CPF">
        <input type="email" id="email" placeholder="Email">
        <button id="btnCadastrar">Cadastrar Cliente</button>
        <h3>Leitores Cadastrados:</h3>

        <div id="listaClientes"></div>
    </section>

    <hr> <!-- Cria uma linha separando conteúdos -->
    <section>
        <h2>Buscar Livro</h2>
        <input type="text" id="buscalivro" placeholder="Digite o nome do livro">
        <button id="btnBuscar">Buscar</button>
        <div id="loading" style="display: none; font-weight: bold; margin: 10px 0; color: hotpink;">
            ⏳ Buscando livro na nuvem... Aguarde...
        </div>

        <div id="resultadoLivro"></div>
    </section>

    <hr> <section>
        <h2>Realizar Empréstimo</h2>
        <div style="margin-bottom: 15px;">
            <label for="selectCliente" style="display: block; margin-bottom: 5px; font-weight: bold;">Escolha o Cliente:</label>
            <select id="selectCliente" style="width: 100%; padding: 10px; border-radius: 8px;">
                <option value=""> Selecione quem vai pegar o livro </option>
            </select>
        </div>

        <div id="livroSelecionadoContainer"></div>
    </section>

    <hr>

    <section>
        <h2>Empréstimos Ativos</h2>
        <div id="listaEmprestimos"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
